<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 주요 지점 거리 측정 지도</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        /* 페이지 전체 및 지도 스타일 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        /* 거리 표시 팝업 스타일 커스텀 */
        .distance-label {
            background: white;
            border: 2px solid #3388ff;
            border-radius: 4px;
            padding: 4px 8px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. 지도 초기화 (중앙여고 근처를 중심으로 설정)
        const map = L.map('map').setView([33.493, 126.535], 13);

        // 2. 배경 지도 타일 레이어 추가 (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. 각 지점의 위경도 좌표 설정
        const locations = {
            airport: { name: "제주국제공항", coords: [33.5104, 126.4914] },
            highSchool: { name: "중앙여고", coords: [33.4905, 126.5404] },
            university: { name: "제주대학교", coords: [33.4560, 126.5620] }
        };

        // 4. 마커 생성 및 지도에 추가 (클릭 시 이름 표시)
        const markerAirport = L.marker(locations.airport.coords).addTo(map).bindPopup(`<b>${locations.airport.name}</b>`);
        const markerHighSchool = L.marker(locations.highSchool.coords).addTo(map).bindPopup(`<b>${locations.highSchool.name}</b>`);
        const markerUniversity = L.marker(locations.university.coords).addTo(map).bindPopup(`<b>${locations.university.name}</b>`);

        // 5. 두 지점 사이의 거리를 계산하고 선을 그리는 함수
        function drawDistanceLine(loc1, loc2) {
            // Leaflet의 distance 메서드는 미터(m) 단위로 거리를 반환합니다.
            const latlng1 = L.latLng(loc1.coords);
            const latlng2 = L.latLng(loc2.coords);
            const distanceInMeters = latlng1.distanceTo(latlng2);
            const distanceInKm = (distanceInMeters / 1000).toFixed(2); // km 단위 변환 후 소수점 둘째자리까지

            // 두 지점을 연결하는 직선(Polyline) 그리기
            const polyline = L.polyline([loc1.coords, loc2.coords], {
                color: '#3388ff',
                weight: 4,
                opacity: 0.7,
                dashArray: '5, 10' // 점선 효과
            }).addTo(map);

            // 선의 중간 지점 계산 (텍스트 라벨을 띄울 위치)
            const midLat = (loc1.coords[0] + loc2.coords[0]) / 2;
            const midLng = (loc1.coords[1] + loc2.coords[1]) / 2;

            // 중간 지점에 거리를 나타내는 툴팁(Tooltip) 추가
            polyline.bindTooltip(`${distanceInKm} km`, {
                permanent: true,       // 마우스 오버 없이 항상 표시
                direction: 'center',    // 선의 정중앙에 위치
                className: 'distance-label' // 커스텀 스타일 적용
            }).openTooltip(L.latLng(midLat, midLng));
        }

        // 6. 각 구간별 선 및 거리 표시 실행
        // 구간 1: 제주공항 ↔ 중앙여고
        drawDistanceLine(locations.airport, locations.highSchool);
        
        // 구간 2: 중앙여고 ↔ 제주대학교
        drawDistanceLine(locations.highSchool, locations.university);

        // (선택사항) 모든 마커가 화면에 다 들어오도록 지도 영역 맞추기
        const group = new L.featureGroup([markerAirport, markerHighSchool, markerUniversity]);
        map.fitBounds(group.getBounds().pad(0.1));
    </script>
</body>
</html>
